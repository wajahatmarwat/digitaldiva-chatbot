<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Digital Diva AI Assistant — Smart Marketing, Smarter Conversations</title>
  <meta name="description"
    content="Chat with Digital Diva's AI assistant to explore marketing services, get quotes, and book a consultation — instantly." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;1,500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css?v=12" />
  <script>
    // If embedded as a widget, add a class to body to hide non-chat elements
    if (window.location.search.includes('widget=true')) {
      document.documentElement.classList.add('widget-mode');
    }
  </script>
</head>

<body>

  <!-- Ambient background glows -->
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>
  <div class="glow glow-3"></div>
  <div class="glow-4"></div>
  <div class="stars"></div>

  <!-- Header -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-mark">DD</div>
        <div class="logo-text">
          <span class="logo-name">Digital Diva</span>
          <span class="logo-tag">AI Assistant</span>
        </div>
      </div>
      <div class="header-badge">
        <span class="pulse-dot"></span>
        <span>Live — Powered by DIVA</span>
      </div>
    </div>
  </header>

  <main class="app-layout">

    <!-- ========= LEFT: CHAT PANEL ========= -->
    <section class="chat-panel">
      <div class="chat-card">

        <!-- Chat top bar -->
        <div class="chat-topbar">
          <div class="agent-info">
            <div class="agent-avatar">
              <span>D</span>
              <span class="avatar-status"></span>
            </div>
            <div>
              <p class="agent-name">Diva</p>
              <p class="agent-status">Online · replies instantly</p>
            </div>
          </div>
          <button id="new-chat-btn" type="button" class="btn-ghost" title="Start new chat">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <polyline points="1 4 1 10 7 10" />
              <path d="M3.51 15a9 9 0 1 0 .49-3.61" />
            </svg>
            New Chat
          </button>
        </div>

        <!-- Messages area -->
        <div id="chat" class="chat-messages" role="log" aria-live="polite" aria-label="Chat messages"></div>

        <!-- Suggestion pills (dynamic) -->
        <div id="followups" class="followups-wrap" aria-label="Quick reply options"></div>

        <!-- Input form -->
        <form id="chat-form" class="chat-input-area" autocomplete="off">
          <div class="input-row">
            <div class="input-wrapper">
              <input id="message" type="text" placeholder="Ask me anything about Digital Diva…" autocomplete="off"
                spellcheck="false" maxlength="500" aria-label="Type your message" />
            </div>
            <button type="submit" class="send-btn" id="send-btn" aria-label="Send message">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13" />
                <polygon points="22 2 15 22 11 13 2 9 22 2" />
              </svg>
            </button>
          </div>
          <p class="input-hint">Powered by Digital Diva · <a href="https://digitaldivapro.com"
              target="_blank">digitaldivapro.com</a></p>
        </form>

      </div>
    </section>

    <!-- ========= RIGHT: SIDE PANEL ========= -->
    <aside class="side-panel">

      <!-- Stats strip -->
      <div class="stats-card">
        <div class="stat-item">
          <span class="stat-val">200+</span>
          <span class="stat-label">Projects Delivered</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-val">6+</span>
          <span class="stat-label">Years Experience</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <span class="stat-val">Global</span>
          <span class="stat-label">Operations</span>
        </div>
      </div>

      <!-- Lead form card -->
      <div class="lead-card">
        <div class="lead-card-header">
          <div class="lead-icon">✦</div>
          <div>
            <h2 class="lead-title">Get a Custom Proposal</h2>
            <p class="lead-sub">We'll respond within 24 hours</p>
          </div>
        </div>

        <form id="lead-form" class="lead-form">
          <div class="field-group">
            <label for="lead-name">Full Name *</label>
            <input id="lead-name" name="name" type="text" placeholder="Name" required />
          </div>
          <div class="field-group">
            <label for="lead-email">Email Address *</label>
            <input id="lead-email" name="email" type="email" placeholder="[EMAIL_ADDRESS]" required />
          </div>
          <div class="field-row">
            <div class="field-group">
              <label for="lead-company">Company / Website</label>
              <input id="lead-company" name="company" placeholder="mycompany.com" />
            </div>
            <div class="field-group">
              <label for="lead-budget">Budget Range</label>
              <input id="lead-budget" name="budget" placeholder="PKR 80k / $1,000" />
            </div>
          </div>
          <div class="field-group">
            <label for="lead-goals">Your Goals *</label>
            <textarea id="lead-goals" name="goals" placeholder="Tell us what you're looking to achieve…"
              required></textarea>
          </div>
          <button type="submit" class="btn-primary btn-full" id="submit-lead-btn">
            <span>Submit & Get Proposal</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="5" y1="12" x2="19" y2="12" />
              <polyline points="12 5 19 12 12 19" />
            </svg>
          </button>
        </form>
        <p id="lead-status" class="lead-status"></p>

        <!-- Quick contact row -->
        <div class="quick-contact">
          <a href="https://api.whatsapp.com/send?phone=923058977853" target="_blank" class="contact-chip">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z" />
              <path
                d="M12 0C5.373 0 0 5.373 0 12c0 2.124.554 4.122 1.524 5.858L0 24l6.278-1.497A11.96 11.96 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.907 0-3.694-.487-5.251-1.34l-.376-.223-3.727.889.908-3.637-.246-.388A9.96 9.96 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z" />
            </svg>
            WhatsApp
          </a>
          <a href="https://calendly.com/" target="_blank" class="contact-chip">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" />
              <line x1="16" y1="2" x2="16" y2="6" />
              <line x1="8" y1="2" x2="8" y2="6" />
              <line x1="3" y1="10" x2="21" y2="10" />
            </svg>
            Book a Call
          </a>
        </div>
      </div>

    </aside>
  </main>

  <!-- Lead review modal -->
  <div id="lead-review-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-label="Review lead details">
    <div class="modal-card">
      <div class="modal-header">
        <h3>Review Your Details</h3>
        <button id="modal-close" class="modal-close" aria-label="Close">✕</button>
      </div>
      <pre id="modal-body" class="modal-body"></pre>
      <div class="modal-actions">
        <button id="review-confirm" class="btn-primary">Confirm & Submit</button>
        <button id="review-edit" class="btn-ghost-sm">Edit Details</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>

</html>
